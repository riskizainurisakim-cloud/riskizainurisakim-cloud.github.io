<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riski Phone Store</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&q=80&w=1600') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.8);
      z-index: -1;
    }
    .container {
      width: 90%;
      margin: auto;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .brand-tabs {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    .brand-buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .cart-btn {
      background: #2a9d8f;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      white-space: nowrap;
    }
    .cart-btn:hover {
      background: #21867a;
    }
    .brand-btn {
      background: #1d3557;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin-right: 5px;
      margin-bottom: 5px;
    }
    .btn-desc {
      background: #457b9d;
      color: #fff;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      margin-right: 5px;
      margin-bottom: 5px;
    }
    .btn-cart {
      background: #2a9d8f;
      color: #fff;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      margin-right: 5px;
      margin-bottom: 5px;
    }
    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      justify-content: center;
      margin-top: 10px;
    }
    .brand-btn:hover, .brand-btn.active {
      background: #457b9d;
    }
    h2 {
      margin-top: 30px;
      color: #1d3557;
    }
    .product-grid {
      display: none;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .product-grid.active {
      display: grid;
    }
    .product-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      overflow: hidden;
      text-align: center;
      padding: 15px;
    }
    .product-card img {
      width: auto;
      height: 150px;
      object-fit: cover;
      border-radius: 6px;
    }
    .product-info h3 {
      margin: 10px 0 5px;
      font-size: 18px;
      color: #222;
    }
    .product-price {
      color: #e63946;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .btn-buy {
      background: #1d3557;
      color: #fff;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
    }
    .btn-buy:hover {
      background: #457b9d;
    }
    .back-card-link {
      text-decoration: none;
      display: block;
      text-align: center;
      margin-top: 50px;
      margin-bottom: 20px;
    }
    .back-card {
      display: inline-block;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      padding: 10px 20px;
      color: #1d3557;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .back-card:hover {
      background: #f8f9fa;
    }

    /* Modal */
    #checkoutModal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      width: 400px;
      max-width: 90%;
    }
    .close-modal {
      float: right;
      cursor: pointer;
      font-size: 20px;
      color: #333;
    }
    /* Modal Receipt */
    #receiptModal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.5s ease-in-out;
    }
    .receipt-modal-content {
      background: linear-gradient(135deg, #e8f5e8, #ffffff);
      padding: 30px;
      border-radius: 15px;
      width: 90%;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: slideUp 0.5s ease-out;
      position: relative;
      color: black;
    }
    .close-receipt {
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      font-size: 24px;
      color: black;
      font-weight: bold;
    }
    /* Modal Deskripsi */
    #descriptionModal {
      display: none;
      position: fixed;
      z-index: 1500;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }
    .close-desc {
      float: right;
      cursor: pointer;
      font-size: 20px;
      color: #333;
    }
    /* Modal Keranjang */
    #cartModal {
      display: none;
      position: fixed;
      z-index: 1600;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }
    .cart-modal-content {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .close-cart {
      float: right;
      cursor: pointer;
      font-size: 20px;
      color: #333;
      margin-bottom: 10px;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    .cart-item-info {
      flex: 1;
    }
    .cart-item-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .quantity-controls {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .quantity-btn {
      background: #ddd;
      border: none;
      width: 25px;
      height: 25px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cart-total {
      font-size: 18px;
      font-weight: bold;
      text-align: right;
      margin: 20px 0;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 5px;
    }
    .cart-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 20px;
    }
    .btn-clear {
      background: #e63946;
      color: #fff;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
    }
    .close-receipt:hover {
      color: #666;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .receipt-card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin: 10px 0;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      border: 1px solid #ddd;
    }
    .receipt-card h4 {
      margin: 0 0 15px 0;
      font-size: 24px;
    }
    .receipt-card p {
      margin: 8px 0;
      font-size: 16px;
    }
    .receipt-card small {
      display: block;
      margin-top: 10px;
      opacity: 0.8;
    }
    .receipt-card {
      background: #fff;
      padding: 15px;
      margin: 10px 0;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .history-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 8px;
      background: #f1f1f1;
    }
    .history-summary p {
      margin: 0;
      font-weight: bold;
      font-size: 14px;
    }
    .history-summary button {
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 6px;
    }
    .history-detail {
      display: none;
      margin-top: 10px;
      padding: 10px;
      background: #fafafa;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
    }
    .history-detail p {
      margin: 5px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="landing page.html" class="back-card-link">
      <div class="back-card">
        ← Kembali ke Landing Page
      </div>
    </a>
    <h1>📱 Riski Phone Store</h1>

    <!-- Brand Tabs -->
    <div class="brand-tabs">
      <div class="brand-buttons">
        <button class="brand-btn active" onclick="showBrand('iphone')">🍎 iPhone</button>
        <button class="brand-btn" onclick="showBrand('samsung')">📱 Samsung</button>
        <button class="brand-btn" onclick="showBrand('google')">🔍 Google</button>
      </div>
      <button class="cart-btn" onclick="openCart()">🛒 Keranjang (<span id="cartCount">0</span>)</button>
    </div>

    <!-- iPhone -->
    <h2>🍎 iPhone</h2>
    <div id="iphoneGrid" class="product-grid active"></div>

    <!-- Samsung -->
    <h2>📱 Samsung</h2>
    <div id="samsungGrid" class="product-grid"></div>

    <!-- Google -->
    <h2>🔍 Google</h2>
    <div id="googleGrid" class="product-grid"></div>


    <!-- Riwayat Pembelian -->
    <h2>📋 Riwayat Pembelian</h2>
    <button id="historyToggleBtn" class="btn-buy" onclick="showPurchaseHistory()">Lihat Riwayat</button>
    <div id="historySection" style="display: none; margin-top: 20px;">
      <div id="purchaseHistory"></div>
    </div>

    <!-- Modal Checkout -->
    <div id="checkoutModal">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h2>Checkout</h2>
        <form id="orderForm">
          <input type="text" id="selectedProduct" readonly style="width:100%;margin-bottom:10px"><br>
          <input type="text" id="custName" placeholder="Nama Anda" required style="width:100%;margin-bottom:10px"><br>
          <input type="text" id="custAddress" placeholder="Alamat" required style="width:100%;margin-bottom:10px"><br>
          <input type="text" id="discountCode" placeholder="Kode Diskon (opsional)" style="width:100%;margin-bottom:10px"><br>
          <select id="payMethod" required style="width:100%;margin-bottom:10px">
            <option value="">Pilih Metode Pembayaran</option>
            <option value="Transfer Bank">Transfer Bank</option>
            <option value="E-Wallet">E-Wallet</option>
            <option value="COD">COD</option>
          </select><br>
          <input type="text" id="payNumber" placeholder="Nomor Rekening / Akun" required style="width:100%;margin-bottom:10px"><br>
          <button type="submit" class="btn-buy">Konfirmasi Pesanan</button>
        </form>
      </div>
    </div>

    <!-- Modal Receipt -->
    <div id="receiptModal">
      <div class="receipt-modal-content">
        <span class="close-receipt">&times;</span>
        <div id="receiptContent"></div>
      </div>
    </div>

    <!-- Modal Deskripsi -->
    <div id="descriptionModal">
      <div class="modal-content">
        <span class="close-desc">&times;</span>
        <h2 id="descTitle"></h2>
        <p id="descContent"></p>
      </div>
    </div>

    <!-- Modal Keranjang -->
    <div id="cartModal">
      <div class="cart-modal-content">
        <span class="close-cart">&times;</span>
        <h2>🛒 Keranjang Belanja</h2>
        <div id="cartItems"></div>
        <div id="cartTotal" class="cart-total"></div>
        <div class="cart-actions">
          <button id="clearCartBtn" class="btn-clear">Kosongkan Keranjang</button>
          <button id="checkoutCartBtn" class="btn-buy">Checkout Semua</button>
        </div>
      </div>
    </div>

    <!-- Back to Landing Page -->
    <div class="back-card-link">
      <a href="landing page.html" class="back-card">
        <h3>🏠 Kembali ke Halaman Utama</h3>
        <p>Klik di sini untuk kembali ke landing page</p>
      </a>
    </div>
  </div>

// Tampilkan Produk per Brand
function displayProducts() {
  const brands = ["iPhone", "Samsung", "Google", "Xiaomi"];
  brands.forEach(brand => {
    const grid = document.getElementById(brand.toLowerCase() + "Grid");
    grid.innerHTML = products.filter(p => p.brand === brand).map(product => `
      <div class="product-card">
        <img src="${product.image}" alt="${product.name}">
        <div class="product-info">
          <h3>${product.name}</h3>
          <p class="product-price">${product.price}</p>
          <div class="button-group">
            <button class="btn-cart" onclick="addToCart('${product.id}', '${product.name}', '${product.price}')">🛒 Tambah ke Keranjang</button>
            <button class="btn-desc" onclick="openDescription('${product.name}', '${product.desc}')">ℹ️ Deskripsi</button>
            <button class="btn-buy" onclick="openCheckout('${product.name}', '${product.price}')">💳 Beli Sekarang</button>
          </div>
        </div>
      </div>
    `).join('');
  });
}

// Tampilkan Brand Tertentu
function showBrand(brand) {
  // Sembunyikan semua grid
  const grids = document.querySelectorAll('.product-grid');
  grids.forEach(grid => grid.classList.remove('active'));

  // Tampilkan grid yang dipilih
  const selectedGrid = document.getElementById(brand + 'Grid');
  selectedGrid.classList.add('active');

  // Update tombol aktif
  const buttons = document.querySelectorAll('.brand-btn');
  buttons.forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
}

// Buka Modal Deskripsi
function openDescription(name, desc) {
  document.getElementById('descTitle').textContent = name;
  document.getElementById('descContent').textContent = desc;
  document.getElementById('descriptionModal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

// Tambah ke Keranjang
function addToCart(id, name, price) {
  const existingItem = cart.find(item => item.id === id);
  if (existingItem) {
    existingItem.quantity += 1;
  } else {
    cart.push({ id, name, price, quantity: 1 });
  }
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  alert(`${name} telah ditambahkan ke keranjang!`);
}

// Update jumlah item di keranjang
function updateCartCount() {
  const count = cart.reduce((total, item) => total + item.quantity, 0);
  document.getElementById('cartCount').textContent = count;
}

// Buka Modal Keranjang
function openCart() {
  renderCart();
  document.getElementById('cartModal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

// Render isi keranjang
function renderCart() {
  const cartItems = document.getElementById('cartItems');
  const cartTotal = document.getElementById('cartTotal');
  
  if (cart.length === 0) {
    cartItems.innerHTML = '<p>Keranjang kosong</p>';
    cartTotal.innerHTML = '';
    return;
  }
  
  cartItems.innerHTML = cart.map((item, index) => `
    <div class="cart-item">
      <div class="cart-item-info">
        <h4>${item.name}</h4>
        <p>Harga: ${item.price}</p>
      </div>
      <div class="cart-item-controls">
        <div class="quantity-controls">
          <button class="quantity-btn" onclick="updateQuantity(${index}, -1)">-</button>
          <span>${item.quantity}</span>
          <button class="quantity-btn" onclick="updateQuantity(${index}, 1)">+</button>
        </div>
        <button class="btn-clear" onclick="removeFromCart(${index})">Hapus</button>
      </div>
    </div>
  `).join('');
  
  const total = cart.reduce((sum, item) => {
    const price = parseInt(item.price.replace('Rp ', '').replace(/\./g, ''));
    return sum + (price * item.quantity);
  }, 0);
  
  cartTotal.innerHTML = `<p>Total: Rp ${total.toLocaleString('id-ID')}</p>`;
}

// Update quantity item
function updateQuantity(index, change) {
  cart[index].quantity += change;
  if (cart[index].quantity <= 0) {
    cart.splice(index, 1);
  }
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  renderCart();
}

// Hapus item dari keranjang
function removeFromCart(index) {
  cart.splice(index, 1);
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  renderCart();
}

// Kosongkan keranjang
function clearCart() {
  cart = [];
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  renderCart();
}

// Checkout dari keranjang
function checkoutCart() {
  if (cart.length === 0) {
    alert('Keranjang kosong!');
    return;
  }
  
  const total = cart.reduce((sum, item) => {
    const price = parseInt(item.price.replace('Rp ', '').replace(/\./g, ''));
    return sum + (price * item.quantity);
  }, 0);
  
  const productList = cart.map(item => `${item.name} (${item.quantity}x)`).join(', ');
  
  document.getElementById('selectedProduct').value = `${productList} - Total: Rp ${total.toLocaleString('id-ID')}`;
  document.getElementById('cartModal').style.display = 'none';
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  modal.dataset.productPrice = total.toString();
  modal.dataset.productBrand = 'Multiple'; // Since it's from cart
}

// Buka Modal
function openCheckout(name, price) {
  document.getElementById('selectedProduct').value = `${name} (${price})`;
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  // Simpan harga dan brand untuk perhitungan total
  modal.dataset.productPrice = price.replace('Rp ', '').replace(/\./g, '');
  const product = products.find(p => p.name === name);
  modal.dataset.productBrand = product ? product.brand : '';
}

orderForm.onsubmit = (e) => {

  // Validasi kode diskon
  if (discountCode && discountCodes[discountCode]) {
    const discountInfo = discountCodes[discountCode];
    if (discountInfo.brand === null || discountInfo.brand === productBrand) {
      discountPercent = discountInfo.discount;
      discountAmount = Math.round(productPrice * discountPercent);
    } else {
      alert('Kode diskon tidak berlaku untuk brand ini.');
      return;
    }
  }

  const shippingCost = 50000; // Biaya pengiriman tetap
  const subtotal = productPrice - discountAmount;
  const total = subtotal + shippingCost;

    shipping: 'Rp ' + shippingCost.toLocaleString('id-ID'),
    total: 'Rp ' + total.toLocaleString('id-ID')
  };
  addReceipt(orderData);
  savePurchaseHistory(orderData);
  orderForm.reset();
  modal.style.display = 'none';
  document.body.style.overflow = 'auto';
};

      <p><b>Customer:</b> ${data.name}</p>
      <p><b>Produk:</b> ${data.product}</p>
      <p><b>Alamat:</b> ${data.address}</p>
      <p><b>Pembayaran:</b> ${data.payment} (${data.account})</p>
      <p><b>Kode Diskon:</b> ${data.discountCode}</p>
      <p><b>Diskon:</b> ${data.discountAmount}</p>
      <p><b>Ongkir:</b> ${data.shipping}</p>
      <p><b>Total:</b> ${data.total}</p>
    </div>
  `;
  receiptContent.innerHTML = receiptHTML;
  receiptModal.style.display = 'flex';
  document.body.style.overflow = 'hidden';

  // Auto close after 5 seconds
  setTimeout(() => {
    closeReceiptModal();
  }, 5000);
}

// Tutup receipt modal
function closeReceiptModal() {
  receiptModal.style.display = 'none';
  document.body.style.overflow = 'auto';
}

// Simpan Riwayat Pembelian
function savePurchaseHistory(orderData) {
  let history = JSON.parse(localStorage.getItem('purchaseHistory')) || [];
  history.push(orderData);
  localStorage.setItem('purchaseHistory', JSON.stringify(history));
}

// Tampilkan Riwayat Pembelian
function showPurchaseHistory() {
  const history = JSON.parse(localStorage.getItem('purchaseHistory')) || [];
  const isVisible = historySection.style.display !== 'none';

  if (!isVisible) {
    if (history.length === 0) {
      purchaseHistory.innerHTML = '<p>Belum ada riwayat pembelian.</p>';
    } else {
      purchaseHistory.innerHTML = history.map((item, index) => `
        <div class="receipt-card" style="margin-bottom: 10px;">
          <div class="history-summary">
            <p>Pembelian ${index + 1}</p>
            <button class="btn-buy" onclick="toggleHistoryDetail(${index})">Lihat Detail</button>
          </div>
          <div id="detail-${index}" class="history-detail">
            <p><b>ID:</b> ${item.id}</p>
            <p><b>Tanggal:</b> ${item.date}</p>
            <p><b>Produk:</b> ${item.product}</p>
            <p><b>Nama:</b> ${item.name}</p>
            <p><b>Alamat:</b> ${item.address}</p>
            <p><b>Pembayaran:</b> ${item.payment} (${item.account})</p>
            <p><b>Kode Diskon:</b> ${item.discountCode}</p>
            <p><b>Diskon:</b> ${item.discountAmount}</p>
            <p><b>Ongkir:</b> ${item.shipping}</p>
            <p><b>Total:</b> ${item.total}</p>
          </div>
        </div>
      `).join('');
    }
    historySection.style.display = 'block';
    document.getElementById('historyToggleBtn').textContent = 'Tutup Riwayat';
  } else {
    historySection.style.display = 'none';
    document.getElementById('historyToggleBtn').textContent = 'Lihat Riwayat';
  }
}

function toggleHistoryDetail(index) {
  const detail = document.getElementById(`detail-${index}`);
  const button = detail ? detail.previousElementSibling.querySelector('button') : null;
  if (!detail) return;

  const isOpen = detail.style.display === 'block';
  detail.style.display = isOpen ? 'none' : 'block';
  if (button) {
    button.textContent = isOpen ? 'Lihat Detail' : 'Sembunyikan Detail';
  }
}

// Jalankan
displayProducts();
updateCartCount();
</script>
